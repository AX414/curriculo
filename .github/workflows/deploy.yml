name: Deploy React App

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - working-directory: ./novo_curriculo
        run: npm install

      - working-directory: ./novo_curriculo
        run: npm run deploy
